<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Play</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="gameplay-body">

    <div class="gameplay-container">
        <!-- Khu vực bàn chơi -->
        <div id="gameBoard" class="game-board"></div>

        <!-- Thanh thông tin (Sidebar) -->
        <div class="sidebar">
            <div class="info-box">
                <div class="icon">🎯</div>
                <div class="info-text">
                    <span class="label">Level:</span>
                    <span id="levelDisplay" class="value">1/6</span>
                </div>
            </div>

            <div class="info-box">
                <div class="icon">🎯</div>
                <div class="info-text">
                    <span class="label">Score:</span>
                    <span id="scoreDisplay" class="value">0</span>
                </div>
            </div>

            <div class="info-box">
                <div class="icon">🎯</div>
                <div class="info-text">
                    <span class="label">Time:</span>
                    <span id="timerDisplay" class="value">04:10</span>
                </div>
            </div>

            <button class="btn-pause">⏸</button>
        </div>
    </div>

    <!-- BẢNG PAUSE MENU (Ẩn mặc định) -->
    <div id="pauseOverlay" class="pause-overlay">
        <div class="pause-modal">
            <!-- Nút tắt (X) góc trên -->
            <button class="btn-close-modal" id="btnResumeX">✕</button>

            <!-- Các icon trang trí tĩnh -->
            <div class="modal-decorations">
                <span>🐬</span>
                <span>🎩</span>
                <span>🌻</span>
                <span>🤪</span>
                <span>🎁</span>
            </div>

            <!-- Các nút chức năng -->
            <div class="modal-buttons">
                <button class="btn-modal" id="btnResume">CONTINUE</button>
                <button class="btn-modal" id="btnMenu">MENU</button>
            </div>
        </div>
    </div>

    <!-- BẢNG LEVEL COMPLETE POPUP -->
    <div id="levelOverlay" class="pause-overlay">
        <!-- PHÁO HOA -->
        <div class="fireworks-container">
            <span class="firework firework1"></span>
            <span class="firework firework2"></span>
            <span class="firework firework3"></span>
            <span class="firework firework4"></span>
            <span class="firework firework5"></span>
        </div>

        <!-- CONFETTI -->
        <div class="confetti-container">
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
            <span class="confetti"></span>
        </div>
        <div class="pause-modal">
            <div class="modal-decorations">
                <span>🐬</span>
                <span>🎩</span>
                <span>🌻</span>
                <span>🤪</span>
                <span>🎁</span>
            </div>
            <div class="level-message" id="levelMessage">Tuyệt vời! Bạn đã vượt qua Level 1.</div>
            <div class="modal-buttons">
                <button class="btn-modal" id="btnContinueLevel">NEXT LEVEL</button>
                <button class="btn-modal" id="btnLevelMenu">MENU</button>
            </div>
        </div>
    </div>

    <!-- BẢNG GAME OVER POPUP -->
    <div id="gameOverOverlay" class="pause-overlay">
        <div class="pause-modal">
            <div class="modal-decorations">
                <span>☠️</span>
                <span>💔</span>
                <span>🏆</span>
                <span>💔</span>
                <span>☠️</span>
            </div>
            <div class="level-message" id="gameOverMessage" style="font-size: 20px; white-space: pre-line;">Hết thời
                gian! Trò chơi kết thúc.</div>
            <div class="modal-buttons">
                <button class="btn-modal" id="btnEndGame">QUAY LẠI MENU</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
