<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-container">
        <div class="light-rays"></div>



        <div class="menu-buttons">
            <button class="btn-play" id="btnInitialPlay">▶ PLAY</button>

            <div id="nameInputArea" style="display: none; flex-direction: column; align-items: center;">
                <input type="text" id="playerNameInput" placeholder="NHẬP TÊN CỦA BẠN..." maxlength="15">
                <button class="btn-play" id="btnStartGame">BẮT ĐẦU</button>
            </div>

            <button class="btn-how">HOW TO PLAY</button>

            <button class="btn-leaderboard" id="btnOpenLeaderboard">🏆 RANKING</button>
        </div>

        <div id="leaderboardOverlay" class="pause-overlay">
            <div class="pause-modal"
                style="background-color: #ffd000; border: 5px solid #fff; color: #1e4a9e; min-width: 340px;">
                <button class="btn-close-modal" id="btnCloseLeaderboard">✕</button>
                <h3 style="font-size: 28px; margin-top: 10px; margin-bottom: 10px;">🏆 RANKING</h3>

                <div id="leaderboardList"
                    style="padding: 10px; margin: 15px 0; max-height: 280px; overflow-y: auto; background: #fff; border-radius: 12px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);">
                </div>

                <button class="btn-modal"
                    style="margin-top:5px; width:150px; background: linear-gradient(to bottom, #de5df7, #b128e0);"
                    id="btnCloseLeaderboardBtn">ĐÓNG</button>
            </div>
        </div>
    </div>

    <!-- Màn hình hướng dẫn mới thêm vào -->
    <div id="how-to-play-screen" class="how-to-overlay">
        <div class="overlay-content">
            <button id="btn-back">BACK</button>
        </div>
    </div>

    <!-- Popup tiếp tục/khởi động mới khi đã chơi trước đó -->
    <!-- <div id="resumeOverlay" class="pause-overlay">
        <div class="pause-modal">

                <span>🎮</span>
            </div>
            <div class="level-message">Bạn đã có trò chơi trước đó.</div>
            <div class="modal-buttons">
                <button class="btn-modal" id="btnStartNewGame">START NEW GAME</button>
                <button class="btn-modal" id="btnContinuePreviousGame">CONTINUE PREVIOUS GAME</button>
            </div>
        </div>
    </div> -->

    <script src="script.js"></script>
</body>

</html>
